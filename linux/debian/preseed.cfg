# do głównego katalogu ISO
# dopisać do grub.cfg:
###### auto=true priority=critical preseed/file=/cdrom/preseed.cfg

## brak pytań
## auto partycjonowanie (cały dysk)
## user: user
## hasło: user
## hostname: thinclient
## GUI: LXDE
## locale: pl_PL.UTF-8
## klawiatura: pl
## Ethernet DHCP


### Locale
d-i debian-installer/locale string pl_PL.UTF-8
d-i keyboard-configuration/xkb-keymap select pl

### Network
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string thinclient
d-i netcfg/get_domain string local

### Mirror
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

### User
d-i passwd/root-login boolean false
d-i passwd/user-fullname string User
d-i passwd/username string user
d-i passwd/user-password password user
d-i passwd/user-password-again password user

### Time
d-i clock-setup/utc boolean true
d-i time/zone string Europe/Warsaw

### Partitioning (USE WHOLE DISK!)
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

### Packages
tasksel tasksel/first multiselect standard
d-i pkgsel/include string \
  xorg lxde-core lightdm network-manager

### Recommends off
d-i pkgsel/install-recommends boolean false

### Bootloader
d-i grub-installer/only_debian boolean true

### Finish
d-i finish-install/reboot_in_progress note
